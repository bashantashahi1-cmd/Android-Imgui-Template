name: Build Native

on:
  action:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"

      - name: Build Native Libraries
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=app/src/main \
            APP_BUILD_SCRIPT=app/src/main/jni/Android.mk \
            NDK_APPLICATION_MK=app/src/main/jni/Application.mk

      - name: Create jniLibs and Copy .so Files
        run: |
          mkdir -p app/src/main/jniLibs
          if [ -d "app/src/main/libs" ]; then
            cp -r app/src/main/libs/* app/src/main/jniLibs/
          fi

      - name: Commit and Push .so Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          rm -rf app/src/main/libs
          git add -f app/src/main/jniLibs/**/*.so
          if git diff --staged --quiet; then
            exit 0
          else
            git commit -m "Update native libraries [skip ci]"
            git push
          fi

      - name: Upload .so Files
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: |
            app/src/main/jniLibs/**/*.so
