name: Build KPM + Zygisk Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install cross-compiler
        run: |
          wget https://developer.arm.com/-/media/Files/downloads/gnu/11.2-2022.02/gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf.tar.xz
          tar -xf gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf.tar.xz
          sudo mv gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf /opt/
      - name: Build KPM
        run: |
          export PATH=/opt/gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf/bin:$PATH
          cd kpm
          make
      - name: Upload KPM artifact
        uses: actions/upload-artifact@v3
        with:
          name: kpm
          path: kpm/*.kpm

  build-zygisk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Set up Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV
      - name: Build Zygisk module
        run: |
          cd zygisk
          ndk-build
      - name: Package Magisk module
        run: |
          cp zygisk/libs/arm64-v8a/libffmod.so module/system/lib64/
          cd module
          zip -r ../ff-ultimate-mod.zip *
      - name: Upload Zygisk module
        uses: actions/upload-artifact@v3
        with:
          name: magisk-module
          path: ff-ultimate-mod.zip
