name: Build KPM + Zygisk Module

on:
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/11.2-2022.02/gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf.tar.xz
          tar -xJf gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf.tar.xz
          sudo mv gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf /opt/
      - name: Build KPM
        run: |
          export PATH=/opt/gcc-arm-11.2-2022.02-x86_64-aarch64-none-elf/bin:$PATH
          cd kpm
          make
      - uses: actions/upload-artifact@v4
        with:
          name: kpm
          path: kpm/*.kpm

  build-zygisk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
      - name: Build Zygisk lib
        run: |
          cd zygisk/jni
          ndk-build
      - name: Package module
        run: |
          mkdir -p zygisk/module/system/lib64
          cp zygisk/libs/arm64-v8a/libffmod.so zygisk/module/system/lib64/
          cd zygisk/module
          zip -r ../../ff-ultimate-mod.zip *
      - uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: ff-ultimate-mod.zip
